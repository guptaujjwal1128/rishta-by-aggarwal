<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Transparent background (default) -->
  
  <!-- Red circle background -->
  <circle cx="256" cy="256" r="240" fill="#A61C3C" />
  
  <!-- Gold decorative overlapping circles -->
  <circle cx="180" cy="160" r="95" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.4"/>
  <circle cx="332" cy="352" r="95" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.4"/>
  
  <!-- Gold letter "R" - Upper Left Diagonal (Bigger) -->
  <text x="180" y="160" font-family="Georgia, serif" font-size="340" font-weight="900" fill="#D4AF37" text-anchor="middle" dominant-baseline="middle" stroke="#A61C3C" stroke-width="2">R</text>
  
  <!-- Gold letter "R" outline for clarity -->
  <text x="180" y="160" font-family="Georgia, serif" font-size="340" font-weight="900" fill="none" stroke="#FFD700" stroke-width="3" text-anchor="middle" dominant-baseline="middle" opacity="0.6">R</text>
  
  <!-- Gold letter "A" - Lower Right Diagonal (Bigger) -->
  <text x="332" y="352" font-family="Georgia, serif" font-size="340" font-weight="900" fill="#D4AF37" text-anchor="middle" dominant-baseline="middle" stroke="#A61C3C" stroke-width="2">A</text>
  
  <!-- Gold letter "A" outline for clarity -->
  <text x="332" y="352" font-family="Georgia, serif" font-size="340" font-weight="900" fill="none" stroke="#FFD700" stroke-width="3" text-anchor="middle" dominant-baseline="middle" opacity="0.6">A</text>
  
  <!-- Subtle connecting line design -->
  <line x1="220" y1="200" x2="292" y2="312" stroke="#D4AF37" stroke-width="2" opacity="0.3"/>
</svg>
