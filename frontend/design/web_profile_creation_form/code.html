<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Web Profile Creation Form</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#FDAA84", // Matrimonial app primary color
              "secondary": "#FF80B7",
              "tertiary": "#FFDE85",
              "background-light": "#f8f6f5",
              "background-dark": "#221610",
              "text-light": "#1c120d",
              "text-dark": "#f8f6f5",
              "subtle-text-light": "#9c6449",
              "subtle-text-dark": "#a39e9b",
              "border-light": "#e8d7ce",
              "border-dark": "#443933",
            },
            fontFamily: {
              "display": ["Plus Jakarta Sans", "Noto Sans", "sans-serif"]
            },
            borderRadius: { "DEFAULT": "1rem", "lg": "1.5rem", "xl": "2rem", "full": "9999px" },
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex min-h-screen w-full flex-col group/design-root overflow-x-hidden text-text-light dark:text-text-dark">
<!-- TopAppBar -->
<header class="sticky top-0 z-10 flex items-center justify-between bg-background-light/80 dark:bg-background-dark/80 p-4 pb-2 backdrop-blur-sm">
<div class="flex size-12 shrink-0 items-center justify-start text-text-light dark:text-text-dark">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
<h2 class="flex-1 text-center text-lg font-bold leading-tight tracking-[-0.015em] text-text-light dark:text-text-dark">Rishta by Aggarwal</h2>
<div class="flex size-12 shrink-0 items-center justify-end"></div> <!-- Spacer for centering -->
</header>
<!-- HeadlineText -->
<h1 class="tracking-light text-[32px] font-bold leading-tight px-4 pb-3 pt-6 text-left">Create Your Profile</h1>
<!-- SegmentedButtons -->
<div class="flex px-4 py-3">
<div class="flex h-12 flex-1 items-center justify-center rounded-full bg-border-light/40 dark:bg-border-dark/40 p-1">
<label class="flex h-full grow cursor-pointer items-center justify-center overflow-hidden rounded-full px-2 text-sm font-medium leading-normal text-subtle-text-light dark:text-subtle-text-dark has-[:checked]:bg-background-light has-[:checked]:text-text-light has-[:checked]:shadow-md dark:has-[:checked]:bg-background-dark dark:has-[:checked]:text-text-dark">
<span class="truncate">Upload Document</span>
<input class="invisible w-0" name="profile_method" type="radio" value="Upload Document"/>
</label>
<label class="flex h-full grow cursor-pointer items-center justify-center overflow-hidden rounded-full px-2 text-sm font-medium leading-normal text-subtle-text-light dark:text-subtle-text-dark has-[:checked]:bg-background-light has-[:checked]:text-text-light has-[:checked]:shadow-md dark:has-[:checked]:bg-background-dark dark:has-[:checked]:text-text-dark">
<span class="truncate">Fill Manually</span>
<input checked="" class="invisible w-0" name="profile_method" type="radio" value="Fill Manually"/>
</label>
</div>
</div>
<!-- Manual Form Section -->
<main class="flex flex-col gap-4 px-4 py-3">
<!-- Basic Information Section -->
<section>
<h3 class="text-lg font-bold leading-tight tracking-[-0.015em] pb-2 pt-4">Basic Information</h3>
<!-- Full Name TextField -->
<div class="flex max-w-[480px] flex-wrap items-end gap-4 py-2">
<label class="flex min-w-40 flex-1 flex-col">
<p class="pb-2 text-base font-medium leading-normal">Full Name</p>
<input class="form-input flex h-14 min-w-0 flex-1 resize-none overflow-hidden rounded-xl border border-border-light bg-background-light p-[15px] text-base font-normal leading-normal text-text-light placeholder:text-subtle-text-light focus:border-primary focus:outline-0 focus:ring-0 dark:border-border-dark dark:bg-background-dark dark:text-text-dark dark:placeholder:text-subtle-text-dark" placeholder="Enter your full name" value=""/>
</label>
</div>
<!-- Date of Birth & Gender -->
<div class="flex flex-col gap-4 py-2 sm:flex-row">
<!-- Date Picker -->
<div class="flex max-w-[480px] flex-wrap items-end gap-4 flex-1">
<label class="flex min-w-40 flex-1 flex-col">
<p class="pb-2 text-base font-medium leading-normal">Date of Birth</p>
<div class="relative flex items-center">
<input class="form-input flex h-14 w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl border border-border-light bg-background-light p-[15px] pr-12 text-base font-normal leading-normal text-text-light placeholder:text-subtle-text-light focus:border-primary focus:outline-0 focus:ring-0 dark:border-border-dark dark:bg-background-dark dark:text-text-dark dark:placeholder:text-subtle-text-dark" placeholder="DD/MM/YYYY" type="text"/>
<span class="material-symbols-outlined absolute right-4 text-subtle-text-light dark:text-subtle-text-dark">calendar_today</span>
</div>
</label>
</div>
<!-- Height -->
<div class="flex max-w-[480px] flex-wrap items-end gap-4 flex-1">
<label class="flex min-w-40 flex-1 flex-col">
<p class="pb-2 text-base font-medium leading-normal">Height</p>
<input class="form-input flex h-14 min-w-0 flex-1 resize-none overflow-hidden rounded-xl border border-border-light bg-background-light p-[15px] text-base font-normal leading-normal text-text-light placeholder:text-subtle-text-light focus:border-primary focus:outline-0 focus:ring-0 dark:border-border-dark dark:bg-background-dark dark:text-text-dark dark:placeholder:text-subtle-text-dark" placeholder="e.g., 5ft 8in" value=""/>
</label>
</div>
</div>
<!-- Marital Status Dropdown -->
<div class="flex max-w-[480px] flex-wrap items-end gap-4 py-2">
<label class="flex min-w-40 flex-1 flex-col">
<p class="pb-2 text-base font-medium leading-normal">Marital Status</p>
<div class="relative">
<select class="form-select flex h-14 w-full min-w-0 flex-1 appearance-none resize-none overflow-hidden rounded-xl border border-border-light bg-background-light p-[15px] text-base font-normal leading-normal text-text-light focus:border-primary focus:outline-0 focus:ring-0 dark:border-border-dark dark:bg-background-dark dark:text-text-dark">
<option>Never Married</option>
<option>Divorced</option>
<option>Widowed</option>
</select>
<span class="material-symbols-outlined pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 text-subtle-text-light dark:text-subtle-text-dark">expand_more</span>
</div>
</label>
</div>
</section>
<!-- Religious & Family Background Section -->
<section>
<h3 class="text-lg font-bold leading-tight tracking-[-0.015em] pb-2 pt-4">Religious &amp; Family Background</h3>
<!-- Religion & Caste -->
<div class="flex flex-col gap-4 py-2 sm:flex-row">
<div class="flex max-w-[480px] flex-wrap items-end gap-4 flex-1">
<label class="flex min-w-40 flex-1 flex-col">
<p class="pb-2 text-base font-medium leading-normal">Religion</p>
<input class="form-input flex h-14 min-w-0 flex-1 resize-none overflow-hidden rounded-xl border border-border-light bg-background-light p-[15px] text-base font-normal leading-normal text-text-light placeholder:text-subtle-text-light focus:border-primary focus:outline-0 focus:ring-0 dark:border-border-dark dark:bg-background-dark dark:text-text-dark dark:placeholder:text-subtle-text-dark" placeholder="e.g., Hindu" value=""/>
</label>
</div>
<div class="flex max-w-[480px] flex-wrap items-end gap-4 flex-1">
<label class="flex min-w-40 flex-1 flex-col">
<p class="pb-2 text-base font-medium leading-normal">Caste</p>
<input class="form-input flex h-14 min-w-0 flex-1 resize-none overflow-hidden rounded-xl border border-border-light bg-background-light p-[15px] text-base font-normal leading-normal text-text-light placeholder:text-subtle-text-light focus:border-primary focus:outline-0 focus:ring-0 dark:border-border-dark dark:bg-background-dark dark:text-text-dark dark:placeholder:text-subtle-text-dark" placeholder="e.g., Aggarwal" value=""/>
</label>
</div>
</div>
</section>
<!-- Education & Career Section -->
<section>
<h3 class="text-lg font-bold leading-tight tracking-[-0.015em] pb-2 pt-4">Education &amp; Career</h3>
<!-- Highest Qualification TextField -->
<div class="flex max-w-[480px] flex-wrap items-end gap-4 py-2">
<label class="flex min-w-40 flex-1 flex-col">
<p class="pb-2 text-base font-medium leading-normal">Highest Qualification</p>
<input class="form-input flex h-14 min-w-0 flex-1 resize-none overflow-hidden rounded-xl border border-border-light bg-background-light p-[15px] text-base font-normal leading-normal text-text-light placeholder:text-subtle-text-light focus:border-primary focus:outline-0 focus:ring-0 dark:border-border-dark dark:bg-background-dark dark:text-text-dark dark:placeholder:text-subtle-text-dark" placeholder="e.g., MBA" value=""/>
</label>
</div>
<!-- Occupation TextField -->
<div class="flex max-w-[480px] flex-wrap items-end gap-4 py-2">
<label class="flex min-w-40 flex-1 flex-col">
<p class="pb-2 text-base font-medium leading-normal">Occupation</p>
<input class="form-input flex h-14 min-w-0 flex-1 resize-none overflow-hidden rounded-xl border border-border-light bg-background-light p-[15px] text-base font-normal leading-normal text-text-light placeholder:text-subtle-text-light focus:border-primary focus:outline-0 focus:ring-0 dark:border-border-dark dark:bg-background-dark dark:text-text-dark dark:placeholder:text-subtle-text-dark" placeholder="e.g., Software Engineer" value=""/>
</label>
</div>
</section>
</main>
<!-- CTA Button -->
<footer class="sticky bottom-0 flex flex-col gap-4 bg-background-light/80 p-4 pt-2 backdrop-blur-sm dark:bg-background-dark/80">
<button class="flex h-14 w-full items-center justify-center rounded-full bg-primary text-base font-bold text-white shadow-lg transition-all hover:bg-opacity-90 active:scale-95">
                Create My Profile
            </button>
</footer>
</div>
</body></html>
